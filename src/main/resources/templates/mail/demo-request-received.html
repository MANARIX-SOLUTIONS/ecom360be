<!doctype html>
<html
  lang="fr"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{mail/layout :: emailLayout(${preheader}, ${appUrl}, ~{:: mailBody})}"
>
  <body>
    <th:block th:fragment="mailBody">
      <th:block
        th:replace="~{mail/fragments :: h1Title ('Demande bien reçue')}"
      ></th:block>
      <th:block
        th:replace="~{mail/fragments :: para (${greetingLine})}"
      ></th:block>
      <th:block th:replace="~{mail/fragments :: para (${ackLine})}"></th:block>
      <th:block
        th:replace="~{mail/fragments :: para (${followUpLine})}"
      ></th:block>
      <table
        role="presentation"
        cellpadding="0"
        cellspacing="0"
        style="margin: 0 0 20px; width: 100%"
      >
        <tr th:each="row : ${bulletLines}">
          <td
            style="
              padding: 4px 0;
              font-size: 15px;
              line-height: 1.55;
              color: #334155;
            "
            th:text="|• ${row}|"
          ></td>
        </tr>
      </table>
      <th:block th:replace="~{mail/fragments :: signature}"></th:block>
    </th:block>
  </body>
</html>
