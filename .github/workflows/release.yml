# ──────────────────────────────────────────────────────────────
# Release — Triggered on version tags (e.g., v1.0.0)
# Creates GitHub Release with changelog and triggers CD
# ──────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"      # v1.0.0, v2.1.3, etc.
      - "v[0-9]+.[0-9]+.[0-9]+-*"    # v1.0.0-rc.1, v1.0.0-beta.1

permissions:
  contents: write                     # create release
  packages: write                     # push image

env:
  JAVA_VERSION: "17"

jobs:
  # ════════════════════════════════════════════════════════════
  # 1. Validate — ensure the tag matches build version
  # ════════════════════════════════════════════════════════════
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Print release info
        run: |
          echo "### Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════
  # 2. Build, Test, and publish release JAR
  # ════════════════════════════════════════════════════════════
  build-release:
    name: Build Release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecom360_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run full quality gate
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecom360_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-min-32-characters-long-for-hmac
        run: ./gradlew clean test jacocoTestReport bootJar --no-daemon

      - name: Upload release JAR
        uses: actions/upload-artifact@v4
        with:
          name: release-jar-${{ github.ref_name }}
          path: build/libs/*.jar
          retention-days: 90

  # ════════════════════════════════════════════════════════════
  # 3. Create GitHub Release with auto-generated changelog
  # ════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: release-jar-${{ github.ref_name }}
          path: release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*.jar
