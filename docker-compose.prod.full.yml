# ──────────────────────────────────────────────────────────────
# Docker Compose — Production FULL (Postgres + API sur VPS)
# Usage: docker compose -f docker-compose.prod.full.yml up -d
# Requires .env file with production values
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom360-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ecom360_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB non exposée à l'extérieur

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecom360-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      # Connexion interne Docker : pas de SSL (application-prod force SSL par défaut)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  ecom360_pgdata:
    driver: local
